<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - IVS System">Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/admin.css?v=1.2}">
</head>

<body class="d-flex">

    <nav class="sidebar">
        <div class="sidebar-brand d-flex flex-column align-items-center justify-content-center">
            <span id="realtime-clock" class="fs-4 fw-bold mb-1" style="letter-spacing: 2px;">00:00:00</span>
            <span class="badge bg-light text-dark px-3 py-1 rounded-pill shadow-sm" style="font-size: 0.8rem;">
                <i class="bi bi-shield-check me-1"></i> <span th:text="${session.loggedInUser.position}">Role</span>
            </span>
        </div>

        <ul class="sidebar-nav mt-3">
            <li>
                <a th:href="@{/home}" th:classappend="${currentPage == 'home' ? 'active' : ''}" data-i18n="nav_home">
                    <i class="bi bi-house-door me-2"></i> Trang chủ
                </a>
            </li>
            
            <li class="px-3 pt-3 pb-1 text-uppercase fw-bold" style="color: #adb5bd; font-size: 0.75rem; letter-spacing: 1px;" data-i18n="nav_sys">
                Quản trị hệ thống
            </li>
            
            <li th:if="${session.userPermissions != null and session.userPermissions[1] != null and session.userPermissions[1]['canView']}">
                <a th:href="@{/users}" th:classappend="${currentPage == 'users' ? 'active' : ''}" data-i18n="nav_users">
                    <i class="bi bi-person-lines-fill me-2"></i> Quản lý Người dùng
                </a>
            </li>
            <li th:if="${session.userPermissions != null and session.userPermissions[2] != null and session.userPermissions[2]['canView']}">
                <a th:href="@{/groups}" th:classappend="${currentPage == 'groups' ? 'active' : ''}" data-i18n="nav_groups">
                    <i class="bi bi-collection-fill me-2"></i> Nhóm người dùng
                </a>
            </li>
        </ul>
    </nav>

    <div class="main-content w-100 d-flex flex-column" style="min-height: 100vh; overflow-x: hidden;">
        
        <header class="top-navbar bg-white p-3 shadow-sm d-flex justify-content-between align-items-center">
            
            <div>
                <span class="fs-5 fw-semibold text-secondary" layout:fragment="page-header">Dashboard</span>
            </div>
            
            <div class="d-flex align-items-center gap-4">
                
                <div class="d-flex align-items-center gap-3 border-end pe-4">
                    
                    <button id="themeToggle" class="btn btn-link p-0 text-warning theme-toggle-btn" title="Đổi giao diện">
                        <i class="bi bi-sun-fill fs-4" id="themeIcon"></i>
                    </button>

                    <div class="dropdown">
                        <button class="btn border-0 rounded-pill shadow-sm d-flex align-items-center gap-2 lang-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="fi fi-vn rounded-circle fs-5" id="currentLangIcon"></span> 
                            <span class="fw-bold small" id="currentLangText">VI</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 mt-3 p-2 lang-dropdown">
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-3 py-2 rounded-3 active-lang" href="#" onclick="changeLang(event, 'vn', 'VI')">
                                    <span class="fi fi-vn rounded fs-5"></span> Tiếng Việt
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-3 py-2 rounded-3" href="#" onclick="changeLang(event, 'gb', 'EN')">
                                    <span class="fi fi-gb rounded fs-5"></span> English
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-3 py-2 rounded-3" href="#" onclick="changeLang(event, 'jp', 'JP')">
                                    <span class="fi fi-jp rounded fs-5"></span> 日本語
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle border-0 fw-semibold d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                        <img th:src="@{${session.loggedInUser.avatar}}" class="rounded-circle me-2 shadow-sm" width="32" height="32" style="object-fit: cover;">
                        <span th:text="${session.loggedInUser.fullName}">Tên User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                        <li><a class="dropdown-item py-2" th:href="@{/profile}" data-i18n="profile_btn"><i class="bi bi-person me-2"></i>Hồ sơ cá nhân</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" th:href="@{/logout}" data-i18n="logout_btn"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
                    </ul>
                </div>

            </div>
        </header>

        <main class="content-wrapper p-4 flex-grow-1" layout:fragment="content">
        </main>
        
        <footer class="text-center py-3 text-muted small bg-white border-top mt-auto">
            &copy; 2026 Individual Systems. All rights reserved.
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:src="@{/js/i18n.js?v=1.0}"></script>
    
    <script th:src="@{/js/admin.js}"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');

            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
                if (themeIcon) themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                if (themeToggle) themeToggle.classList.replace('text-warning', 'text-light');
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    body.classList.toggle('dark-mode');
                    
                    themeIcon.style.transition = "transform 0.5s ease-in-out";
                    themeIcon.style.transform = "rotate(360deg)";
                    setTimeout(() => themeIcon.style.transform = "none", 500);

                    if (body.classList.contains('dark-mode')) {
                        localStorage.setItem('theme', 'dark');
                        themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                        themeToggle.classList.replace('text-warning', 'text-light');
                    } else {
                        localStorage.setItem('theme', 'light');
                        themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                        themeToggle.classList.replace('text-light', 'text-warning');
                    }
                });
            }
        });
    </script>
    <th:block layout:fragment="js-scripts"></th:block>
</body>
</html>
