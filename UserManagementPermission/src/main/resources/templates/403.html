<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Truy cập bị từ chối</title>
</head>
<body>
    <span layout:fragment="page-header" data-i18n="403_title">Cảnh báo bảo mật</span>

    <div layout:fragment="content" class="d-flex justify-content-center align-items-center h-100">
        <div class="text-center p-5 card border-0 shadow-sm rounded-4">
            <h1 class="display-1 fw-bold text-danger"><i class="bi bi-shield-fill-x"></i> 403</h1>
            <h3 class="fw-bold mb-3" data-i18n="403_access_denied">Truy cập bị từ chối</h3>
            <p class="text-muted fs-5 mb-4" data-i18n="403_msg">Tài khoản của bạn không có quyền truy cập vào chức năng này.<br>Vui lòng liên hệ Admin nếu bạn cần được cấp quyền.</p>
            <a th:href="@{/home}" class="btn btn-warning rounded-pill px-4 py-2 fw-bold text-white" data-i18n="btn_back_home">
                <i class="bi bi-arrow-left me-2"></i> Quay lại trang chủ
            </a>
        </div>
    </div>
</body>
</html>
