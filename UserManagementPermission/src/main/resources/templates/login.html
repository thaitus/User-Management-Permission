<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Individual Systems</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card card-login p-4">
                    <div class="card-body">
                        
                        <div class="logo-container text-center mb-4">
                            <img th:src="@{/images/logo.png}" alt="IVS Logo">
                        </div>

                        <h5 class="text-center mb-4 fw-bold" style="color: #4a4a4a;">ĐĂNG NHẬP</h5>

                        <div th:if="${error}" class="alert alert-danger text-center small p-2 mb-3" style="border-radius: 8px;" role="alert" th:text="${error}"></div>

                        <form th:action="@{/login}" method="post" id="loginForm">
                            
                            <div class="mb-3">
                                <label for="userName" class="form-label text-muted fw-semibold small">Tài khoản</label>
                                <input type="text" class="form-control" id="userName" name="userName" placeholder="Nhập tài khoản" th:value="${userName}" autofocus autocomplete="off">
                                <div th:if="${errorUserName}" class="text-danger small mt-1 fw-semibold" th:text="${errorUserName}"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="pass" class="form-label text-muted fw-semibold small">Mật khẩu</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="pass" name="pass" placeholder="Nhập mật khẩu">
                                    <button class="btn btn-outline-secondary btn-eye" type="button" id="toggleBtn">
                                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                                    </button>
                                </div>
                                <div th:if="${errorPass}" class="text-danger small mt-1 fw-semibold" th:text="${errorPass}"></div>
                            </div>
                            
                            <button type="submit" class="btn btn-brand w-100">ĐĂNG NHẬP</button>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
</body>
</html>
