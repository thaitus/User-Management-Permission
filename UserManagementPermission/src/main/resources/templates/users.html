<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Quản lý người dùng - IVS System</title>
</head>
<body>

    <span layout:fragment="page-header">Quản lý người dùng</span>

    <div layout:fragment="content">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 bg-white border-start border-5 border-success" role="alert">
            <i class="bi bi-check-circle-fill text-success me-2"></i><span class="text-dark fw-semibold" th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center flex-wrap gap-3">
                <h5 class="mb-0 fw-bold" style="color: #ff8c00;">
                    <i class="bi bi-people-fill me-2"></i>Danh sách tài khoản
                </h5>
                
                <div class="d-flex gap-2 align-items-center">
                    <div class="input-group input-group-sm rounded-pill overflow-hidden border">
                        <span class="input-group-text bg-white border-0 text-muted"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-0 shadow-none" placeholder="Tìm tên, tài khoản...">
                    </div>
                    <button class="btn btn-primary btn-sm rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#addUserModal">
                        <i class="bi bi-person-plus-fill me-1"></i> Thêm mới
                    </button>
                </div>
            </div>
            
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-dark fw-bold">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Tài khoản</th>
                                <th>Họ và Tên</th>
                                <th>Nhóm / Vai trò</th>
                                <th>Trạng thái</th>
                                <th class="text-end pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${userList}">
                                <td class="ps-4 fw-bold text-muted" th:text="${user.userID}"></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img th:src="@{${user.avatar != null ? user.avatar : '/images/default-avatar.png'}}" class="rounded-circle me-3 border" width="40" height="40" style="object-fit: cover;">
                                        <div>
                                            <div class="fw-bold text-dark" th:text="${user.userName}"></div>
                                            <div class="text-muted small" th:text="${user.email}"></div>
                                        </div>
                                    </div>
                                </td>
                                <td class="fw-medium text-dark" th:text="${user.fullName}"></td>
                                <td>
                                    <span class="badge bg-light text-dark border px-3 py-2 rounded-pill" th:text="${user.position != null ? user.position : 'Chưa phân nhóm'}"></span>
                                </td>
                                <td>
                                    <span th:if="${user.isActive}" class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1 rounded-pill">Đang hoạt động</span>
                                    <span th:unless="${user.isActive}" class="badge bg-secondary-subtle text-secondary border border-secondary-subtle px-2 py-1 rounded-pill">Đã khóa</span>
                                </td>
                                <td class="text-end pe-4">
                                    <button class="btn btn-sm btn-outline-primary rounded-circle me-1 shadow-sm" title="Chỉnh sửa"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-sm btn-outline-secondary rounded-circle shadow-sm" title="Khóa/Xóa"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(userList)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    Chưa có dữ liệu người dùng
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="card-footer bg-white py-3 border-top d-flex justify-content-between align-items-center">
                <span class="text-muted small">Đang hiển thị trang 1</span>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item disabled"><a class="page-link text-secondary" href="#">Trước</a></li>
                    <li class="page-item active"><a class="page-link bg-primary border-primary" href="#">1</a></li>
                    <li class="page-item"><a class="page-link text-dark" href="#">2</a></li>
                    <li class="page-item"><a class="page-link text-dark" href="#">Sau</a></li>
                </ul>
            </div>
        </div>

        <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content border-0 shadow-lg rounded-4">
                    <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                        <h5 class="modal-title fw-bold" style="color: #ff8c00;">
                            <i class="bi bi-person-plus-fill me-2"></i>Thêm người dùng mới
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <form th:action="@{/users/add}" method="post" autocomplete="off">
                        <div class="modal-body p-4">
                            <div class="row">
                                <div class="col-md-6 border-end pe-4">
                                    <h6 class="fw-bold text-dark mb-3 border-bottom pb-2">Thông tin đăng nhập</h6>
                                    
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-bold small">Tên đăng nhập <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control bg-light border-0 shadow-none" name="userName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-bold small">Mật khẩu <span class="text-danger">*</span></label>
                                        <div class="input-group bg-light rounded-3 overflow-hidden border-0">
                                            <input type="password" class="form-control bg-transparent border-0 shadow-none" name="password" required>
                                            <button class="btn btn-light bg-transparent border-0 text-muted toggle-pwd" type="button"><i class="bi bi-eye-slash"></i></button>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-bold small">Trạng thái</label>
                                        <div class="form-check form-switch mt-1">
                                            <input class="form-check-input" type="checkbox" name="isActive" checked>
                                            <label class="form-check-label text-muted small">Kích hoạt tài khoản ngay</label>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="col-md-6 ps-4">
                                    <h6 class="fw-bold text-dark mb-3 border-bottom pb-2">Thông tin chi tiết</h6>
                                    
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-bold small">Họ và tên <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control bg-light border-0 shadow-none" name="fullName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-bold small">Email</label>
                                        <input type="email" class="form-control bg-light border-0 shadow-none" name="email">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-bold small">Phân nhóm / Vai trò <span class="text-danger">*</span></label>
                                        <div class="d-flex gap-2">
                                            <select class="form-select bg-light border-0 shadow-none" name="position" required>
                                                <option value="" selected disabled>-- Chọn nhóm --</option>
                                                <option value="Admin">Admin</option>
                                                <option value="Manager">Manager</option>
                                                <option value="Staff">Staff</option>
                                            </select>
                                            <button type="button" class="btn btn-secondary btn-sm rounded-3 shadow-sm px-3" title="Tạo nhóm mới">
                                                <i class="bi bi-plus-lg"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="modal-footer border-top-0 pb-4 justify-content-center bg-light rounded-bottom-4 mt-2">
                            <button type="button" class="btn btn-secondary rounded-pill px-4 fw-semibold" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm">Thêm người dùng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
