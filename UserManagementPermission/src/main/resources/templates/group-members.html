<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Quản lý Thành viên - IVS System</title>
    <style>
        /* Hiệu ứng bôi cam khi chọn user */
        .user-select-card { cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
        .user-select-card:hover { background-color: #f8f9fa; }
        .user-select-card.selected { border-color: #ff8c00; background-color: #fff3e6; }
        .user-select-card.selected .check-icon { color: #ff8c00 !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <span layout:fragment="page-header" class="d-none"></span>

    <div layout:fragment="content">
        
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <h2 class="fw-bold mb-0" style="color: #ff8c00; font-size: 28px;">
                <i class="bi bi-people-fill me-2"></i>Thành viên nhóm: <span class="text-dark" th:text="${group.groupName}"></span>
            </h2>
            <a th:href="@{/groups}" class="btn btn-outline-secondary rounded-pill px-4 py-2 fw-bold shadow-sm d-flex align-items-center gap-2 transition-all">
                <i class="bi bi-arrow-left"></i> <span data-i18n="btn_back">Quay lại danh sách</span>
            </a>
        </div>

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 border-start border-5 border-success rounded-3 mb-4" role="alert">
            <i class="bi bi-check-circle-fill text-success me-2"></i><span class="text-dark fw-semibold" th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 border-start border-5 border-danger rounded-3 mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i><span class="text-dark fw-semibold" th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                        <h5 class="fw-bold text-dark mb-0"><i class="bi bi-person-check-fill text-success me-2"></i>Đang trong nhóm (<span th:text="${#lists.size(currentMembers)}"></span>)</h5>
                    </div>
                    <div class="card-body p-3 overflow-auto" style="max-height: 600px;">
                        
                        <div th:if="${#lists.isEmpty(currentMembers)}" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2 opacity-25"></i>
                            Nhóm này hiện chưa có thành viên nào.
                        </div>

                        <ul class="list-group list-group-flush rounded-3">
                            <li th:each="user : ${currentMembers}" class="list-group-item d-flex justify-content-between align-items-center py-3 border-bottom">
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="@{${user.avatar != null ? user.avatar : '/images/default-avatar.png'}}" class="rounded-circle border" width="45" height="45" style="object-fit: cover;">
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${user.fullName}">Họ Tên</div>
                                        <div class="text-muted small" th:text="${user.userName}">Tài khoản</div>
                                    </div>
                                </div>
                                <form th:action="@{/groups/{id}/members/remove(id=${group.groupID})}" method="post" onsubmit="return confirm('Bạn muốn đuổi người này khỏi nhóm?');">
                                    <input type="hidden" name="userId" th:value="${user.userID}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm fw-semibold">Xóa</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                        <h5 class="fw-bold text-dark mb-0"><i class="bi bi-person-plus-fill me-2" style="color: #ff8c00;"></i>Người dùng chưa có nhóm</h5>
                    </div>
                    
                    <form th:action="@{/groups/{id}/members/add(id=${group.groupID})}" method="post" id="addMembersForm" class="d-flex flex-column h-100">
                        <input type="hidden" name="groupName" th:value="${group.groupName}">
                        
                        <div class="card-body p-3 overflow-auto flex-grow-1" style="max-height: 520px;">
                            
                            <div th:if="${#lists.isEmpty(availableUsers)}" class="text-center py-5 text-muted">
                                <i class="bi bi-emoji-smile fs-1 d-block mb-2 opacity-25"></i>
                                Tất cả người dùng đều đã có nhóm!
                            </div>

                            <div class="d-flex flex-column gap-2">
                                <div th:each="user : ${availableUsers}" class="user-select-card card border-1 shadow-none rounded-3 p-2" onclick="toggleSelection(this)">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="d-flex align-items-center gap-3">
                                            <input type="checkbox" name="userIds" th:value="${user.userID}" class="d-none user-checkbox">
                                            <img th:src="@{${user.avatar != null ? user.avatar : '/images/default-avatar.png'}}" class="rounded-circle border" width="45" height="45" style="object-fit: cover;">
                                            <div>
                                                <div class="fw-bold text-dark" th:text="${user.fullName}">Họ Tên</div>
                                                <div class="text-muted small" th:text="${user.userName}">Tài khoản</div>
                                            </div>
                                        </div>
                                        <i class="bi bi-check-circle-fill fs-4 check-icon text-muted opacity-25 pe-2"></i>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                        
                        <div class="card-footer bg-white border-top p-3 d-flex justify-content-between align-items-center rounded-bottom-4">
                            <span class="text-muted fw-semibold small">Đã chọn: <span id="selectedCount" style="color: #ff8c00;">0</span> người</span>
                            <button type="submit" class="btn text-white rounded-pill px-4 fw-bold shadow-sm" style="background-color: #ff8c00; border: none;" id="btnAddSubmit" disabled>
                                Thêm vào nhóm
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <th:block layout:fragment="js-scripts">
        <script>
            // Logic Javascript để xử lý Click vào Card bôi màu và đếm số lượng
            function toggleSelection(card) {
                const checkbox = card.querySelector('.user-checkbox');
                
                // Đảo trạng thái checkbox
                checkbox.checked = !checkbox.checked;
                
                // Toggle Class bôi cam
                if (checkbox.checked) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
                
                // Cập nhật số lượng đếm và Trạng thái nút Submit
                updateSelectedCount();
            }

            function updateSelectedCount() {
                const checkedBoxes = document.querySelectorAll('.user-checkbox:checked');
                const count = checkedBoxes.length;
                
                document.getElementById('selectedCount').innerText = count;
                
                const btnSubmit = document.getElementById('btnAddSubmit');
                if (count > 0) {
                    btnSubmit.removeAttribute('disabled');
                } else {
                    btnSubmit.setAttribute('disabled', 'true');
                }
            }
        </script>
    </th:block>
</body>
</html>
