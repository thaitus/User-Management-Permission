spring.application.name=UserManagementPermission
# Thông tin kết nối DB
spring.datasource.url=jdbc:mysql://localhost:3306/user_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
# pass root

# Tắt cache Thymeleaf để code HTML xong F5 là ăn luôn
spring.thymeleaf.cache=false

# In câu lệnh SQL ra console để dễ debug
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

# Ép Spring Boot sử dụng chính xác tên cột đã định nghĩa, không được tự ý đổi sang dấu gạch dưới
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl